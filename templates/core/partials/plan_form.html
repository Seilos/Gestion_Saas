<div class="p-3">
    <div class="mb-4">
        <h5 class="mb-0 fw-bold">Crear Nuevo Plan</h5>
        <small class="text-muted">Producto: {{ product.name }}</small>
    </div>

    <form hx-post="{{ form_action }}" hx-target="#modal-body">
        {% csrf_token %}
        
        <div class="mb-3">
            <label class="form-label fw-bold small text-muted">Nombre del Plan</label>
            {{ form.name }}
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold small text-muted">Precio (USD)</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 rounded-start-pill ps-3">$</span>
                    {{ form.price_usd }}
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold small text-muted">Duración (Días)</label>
                {{ form.duration_days }}
                <small class="text-muted" style="font-size: 0.65rem;">Pon 0 para acceso ilimitado</small>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold small text-muted">Descripción / Beneficios</label>
            {{ form.description }}
        </div>

        <div class="form-check form-switch mb-4">
            {{ form.is_active }}
            <label class="form-check-label small" for="{{ form.is_active.id_for_label }}">¿Plan activo para nuevos clientes?</label>
        </div>

        <div class="modal-footer border-0 px-0 pb-0">
            <button type="button" class="btn btn-light rounded-pill px-4" hx-get="{% url 'plan_list' product.pk %}" hx-target="#modal-body">Volver</button>
            <button type="submit" class="btn btn-warning rounded-pill px-4 shadow-sm fw-bold">Guardar Plan</button>
        </div>
    </form>
</div>
