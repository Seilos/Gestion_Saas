<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nexo21 Core Orchestrator</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/animate.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        :root {
            --login-bg: #0a0e14; /* Mismo color que el sidebar */
            --accent-cyan: #0dcaf0;
        }

        body.login-page {
            background: linear-gradient(135deg, #0a0e14 0%, #1a1f26 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .login-logo {
            font-size: 3.5rem;
            color: var(--accent-cyan);
            text-shadow: 0 0 20px rgba(13, 202, 240, 0.4);
            margin-bottom: 0.5rem;
        }

        .form-control-pro {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white !important;
            border-radius: 15px;
            padding: 0.8rem 1.2rem;
            transition: all 0.3s;
        }

        .form-control-pro:focus {
            background: rgba(255,255,255,0.08);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(13, 202, 240, 0.2);
        }

        .btn-login {
            background: var(--accent-cyan);
            border: none;
            padding: 0.8rem;
            font-weight: bold;
            border-radius: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(13, 202, 240, 0.3);
            background: #0bb5d9;
        }

        .version-text {
            font-size: 0.75rem;
            letter-spacing: 2px;
            opacity: 0.6;
        }
    </style>
</head>
<body class="login-page">

    <div class="login-card animate__animated animate__fadeInDown">
        <div class="text-center mb-5">
            <div class="login-logo mb-3">
                <i class="fas fa-layer-group"></i>
            </div>
            <h2 class="fw-bold text-white mb-1">Nexo21</h2>
            <p class="text-info version-text text-uppercase mb-0">Core Orchestrator v1.0</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="text-white-50 small mb-2 ps-2">Identificación Personal</label>
                <input type="text" name="username" class="form-control form-control-pro" placeholder="Usuario o Email" required>
            </div>

            <div class="mb-2">
                <label class="text-white-50 small mb-2 ps-2">Clave de Acceso</label>
                <div class="position-relative">
                    <input type="password" id="id_password" name="password" class="form-control form-control-pro" placeholder="••••••••" required>
                    <button type="button" onclick="togglePassword()" class="btn position-absolute top-50 end-0 translate-middle-y text-white-50 border-0">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 px-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label text-white-50 small" for="remember">Recuérdame</label>
                </div>
                <a href="#" class="text-info small text-decoration-none hover-opacity">¿Olvidaste tu clave?</a>
            </div>

            <button type="submit" class="btn btn-login w-100 mb-4">
                INICIAR SESIÓN <i class="fas fa-arrow-right ms-2"></i>
            </button>

            <div class="text-center">
                <p class="text-white-50 small">¿No tienes acceso? <a href="{% url 'register' %}" class="text-info text-decoration-none fw-bold">Solicitar Registro</a></p>
            </div>
        </form>
    </div>

    <script>
        function togglePassword() {
            const passInput = document.getElementById('id_password');
            const icon = document.getElementById('toggleIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
